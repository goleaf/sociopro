name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP quality & tests
    runs-on: ubuntu-latest

    env:
      APP_ENV: testing
      APP_DEBUG: "false"
      DB_CONNECTION: sqlite
      DB_DATABASE: ":memory:"
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: array

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, dom, fileinfo, gd, bcmath, sqlite3, pdo_sqlite
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare application key
        run: cp .env.example .env && php artisan key:generate

      - name: Check code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan/Larastan)
        run: composer analyse

      - name: Run tests
        run: php artisan test

      - name: Config cache smoke check
        run: php artisan config:cache && php artisan config:clear

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Lint JavaScript (ESLint)
        run: npm run lint

      - name: Lint styles (Stylelint)
        run: npm run stylelint

      - name: Check formatting (Prettier)
        run: npm run format:check

      - name: Production asset build
        run: npm run production
